name: Update prices

on:
  schedule:
    # 21:05 UTC = ~2:05 PM PT, just after US market close.
    # Cron in GitHub Actions is best-effort; runs may be delayed under load.
    - cron: "5 21 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price updater
        run: python scripts/update.py

      - name: Commit if changed
        env:
          AUTHOR_NAME: github-actions[bot]
          AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if git diff --quiet -- index.html; then
            echo "index.html unchanged — nothing to commit."
            exit 0
          fi
          git config user.name  "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          git add index.html
          git commit -m "chore: update prices ($(date -u +'%Y-%m-%d %H:%MZ'))"
          git push
